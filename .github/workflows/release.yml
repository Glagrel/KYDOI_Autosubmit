name: Release on Version Bump

on:
  push:
    branches:
      - main
    paths:
      - 'ky_doi_autosubmit.py'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      version-changed: ${{ steps.check-version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from script
        id: get-version
        run: |
          VERSION=$(sed -n 's/.*CURRENT_VERSION = "\([^"]*\)".*/\1/p' ky_doi_autosubmit.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Check if version changed
        id: check-version
        run: |
          SCRIPT_VERSION=$(sed -n 's/.*CURRENT_VERSION = "\([^"]*\)".*/\1/p' ky_doi_autosubmit.py)
          JSON_VERSION=$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' version.json)
          if [ "$SCRIPT_VERSION" != "$JSON_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed from $JSON_VERSION to $SCRIPT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No version change detected"
          fi

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.version-changed == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install NSIS
        run: choco install nsis -y
        shell: powershell

      - name: Build installer with NSIS
        run: |
          $nsis_path = "C:\Program Files (x86)\NSIS\makensis.exe"
          & $nsis_path installer.nsi
          if (-not (Test-Path "KY_DOI_Installer.exe")) {
            throw "NSIS build failed - KY_DOI_Installer.exe not found"
          }
          Write-Host "Build succeeded"
        shell: powershell

      - name: Create GitHub Release
        id: create-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          gh release create "v${VERSION}" KY_DOI_Installer.exe \
            --title "KY DOI PBM Auto Submitter v${VERSION}" \
            --generate-notes
          echo "release-url=https://github.com/Glagrel/KYDOI_Autosubmit/releases/download/v${VERSION}/KY_DOI_Installer.exe" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Update version.json
        run: |
          $VERSION = "${{ needs.check-version.outputs.version }}"
          $DOWNLOAD_URL = "https://github.com/Glagrel/KYDOI_Autosubmit/releases/download/v$VERSION/KY_DOI_Installer.exe"
          $versionJson = [ordered]@{
              version      = $VERSION
              download_url = $DOWNLOAD_URL
              notes        = "Release v$VERSION"
          }
          $versionJson | ConvertTo-Json | Set-Content version.json -Encoding UTF8
          Get-Content version.json
        shell: powershell

      - name: Commit and push version.json
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add version.json
          git commit -m "chore: update version.json to v${{ needs.check-version.outputs.version }}" || echo "No changes to commit"
          git push
        shell: bash

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KY_DOI_Installer
          path: KY_DOI_Installer.exe
